name: Financial Risk Analyzer Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest
        
    - name: Lint with Ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        ruff check . --select=E9,F63,F7,F82 --show-source
        
    - name: Train Scikit-Learn Model
      run: |
        # Generate the artifacts for tests
        python -m src.train_model
        
    - name: Test API endpoints
      run: |
        # Add basic tests or use httpx to mock
        # pytest tests/
        echo "API and Unit tests go here"
